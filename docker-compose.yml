services:
  pix2tex:
    image: lukasblecher/pix2tex:api
    restart: unless-stopped
    expose:
      - "8502"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - pix2tex
    ports:
      - "80:80"
      - "443:443"
    environment:
      LATEX_OCR_DOMAIN: ${LATEX_OCR_DOMAIN}
      LATEX_OCR_ACME_EMAIL: ${LATEX_OCR_ACME_EMAIL}
      LATEX_OCR_BEARER_TOKEN: ${LATEX_OCR_BEARER_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
