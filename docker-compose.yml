services:
  pix2tex:
    image: lukasblecher/pix2tex:api
    restart: unless-stopped
    expose:
      - "8502"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8502/', timeout=5).getcode() == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      pix2tex:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      LATEX_OCR_BEARER_TOKEN: ${LATEX_OCR_BEARER_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
